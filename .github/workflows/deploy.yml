name: Docker Compose Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  docker-compose:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker images
      run: |
         docker compose  build

    - name: Stop and remove containers
      run: |
       docker compose  down

    - name: Start services
      run: |
        docker compose  up -d
